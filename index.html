<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Live Vehicle Stream Demo</title>
  <style>
    :root {
      --bg: #07111f;
      --panel: rgba(10, 18, 33, 0.9);
      --line: rgba(148, 163, 184, 0.18);
      --text: #e7eef8;
      --muted: #9fb1c7;
      --accent: #68d7ff;
      --accent-2: #7fffba;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(102, 215, 255, 0.16), transparent 24%),
        radial-gradient(circle at top right, rgba(127, 255, 186, 0.12), transparent 22%),
        linear-gradient(180deg, #06101c 0%, #091423 40%, #0e1727 100%);
      font-family: "Segoe UI", Arial, sans-serif;
      padding: 24px;
    }

    .shell {
      max-width: 1440px;
      margin: 0 auto;
    }

    .panel {
      border: 1px solid var(--line);
      border-radius: 20px;
      background: var(--panel);
      backdrop-filter: blur(16px);
      padding: 20px;
      margin-bottom: 18px;
    }

    h1 {
      margin: 0 0 10px;
      font-size: clamp(1.8rem, 4vw, 3rem);
      line-height: 1;
    }

    p {
      color: var(--muted);
      margin: 0;
      line-height: 1.6;
    }

    .controls {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto auto auto;
      gap: 12px;
      align-items: center;
      margin-top: 18px;
    }

    input, button {
      font: inherit;
      border-radius: 14px;
      border: 1px solid var(--line);
      padding: 14px 16px;
    }

    input {
      width: 100%;
      background: rgba(255,255,255,0.04);
      color: var(--text);
      outline: none;
    }

    button {
      cursor: pointer;
      font-weight: 700;
    }

    .btn-primary {
      color: #07111f;
      background: linear-gradient(135deg, #8befff 0%, #68d7ff 52%, #7fffba 100%);
    }

    .btn-secondary {
      background: rgba(255,255,255,0.04);
      color: var(--text);
    }

    .stream-wrap {
      border-radius: 18px;
      overflow: hidden;
      border: 1px solid var(--line);
      background: #020815;
      min-height: 320px;
    }

    .stream-wrap video {
      display: block;
      width: 100%;
      height: auto;
      max-height: 80vh;
      object-fit: contain;
      background: #020815;
    }

    .status {
      margin-top: 14px;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .layout {
      display: grid;
      grid-template-columns: 1fr;
      gap: 18px;
      align-items: start;
    }

    .results-head {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.04);
      color: var(--text);
      font-size: 0.88rem;
    }

    .results {
      display: grid;
      gap: 12px;
    }

    .table-wrap {
      overflow: auto;
      border-radius: 16px;
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.02);
      margin-top: 14px;
    }

    table {
      width: 100%;
      min-width: 920px;
      border-collapse: collapse;
    }

    th, td {
      padding: 12px 14px;
      border-bottom: 1px solid rgba(148, 163, 184, 0.12);
      text-align: left;
      vertical-align: middle;
    }

    th {
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: #d7e6fb;
      background: rgba(255,255,255,0.04);
    }

    .thumb {
      width: 84px;
      height: 48px;
      object-fit: cover;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.08);
      display: block;
      background: #020815;
    }

    .link {
      color: #8befff;
      text-decoration: none;
    }

    .link:hover {
      text-decoration: underline;
    }

    .empty {
      padding: 18px;
      color: var(--muted);
      border: 1px dashed rgba(159, 177, 199, 0.24);
      border-radius: 14px;
      background: rgba(255,255,255,0.02);
    }

    .small-btn {
      padding: 11px 14px;
      border-radius: 12px;
      white-space: nowrap;
    }

    @media (max-width: 900px) {
      .controls { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="shell">
    <section class="panel">
      <h1>Live Vehicle Stream</h1>
      <p>Enter an RTSP URL or use <strong>0</strong> for a local webcam, then click Start to view the demo video and aggregated results.</p>

      <div class="controls">
        <input id="sourceInput" type="text" placeholder="rtsp://user:pass@ip:554/stream or 0" value="0" />
        <button id="startBtn" class="btn-primary" type="button">Start</button>
        <button id="stopBtn" class="btn-secondary" type="button">Stop</button>
        <button id="refreshBtn" class="btn-secondary small-btn" type="button">Load Results</button>
      </div>

      <div class="status" id="status">Idle</div>
    </section>

    <div class="layout">
      <section class="panel stream-wrap">
        <video id="liveStream" controls autoplay muted loop playsinline></video>
      </section>

      <section class="panel">
        <div class="results-head">
          <div>
            <h2 style="margin:0 0 6px;">Collected Results</h2>
            <span id="resultsMeta" class="pill">No results loaded</span>
          </div>
          <a id="csvLink" class="link" href="#" target="_blank" rel="noreferrer">CSV</a>
        </div>

        <div id="resultsSummary" class="results">
          <div class="empty">No data yet. Start the stream, then stop it or load the latest results.</div>
        </div>

        <div id="resultsTableWrap" class="table-wrap" style="display:none;">
          <table>
            <thead>
              <tr>
                <th>ID</th>
                <th>Type</th>
                <th>Direction</th>
                <th>Conf</th>
                <th>Plate</th>
                <th>Clip</th>
              </tr>
            </thead>
            <tbody id="resultsBody"></tbody>
          </table>
        </div>
      </section>
    </div>
  </div>

  <script>
    const sourceInput = document.getElementById("sourceInput");
    const startBtn = document.getElementById("startBtn");
    const stopBtn = document.getElementById("stopBtn");
    const refreshBtn = document.getElementById("refreshBtn");
    const liveStream = document.getElementById("liveStream");
    const status = document.getElementById("status");
    const resultsMeta = document.getElementById("resultsMeta");
    const resultsSummary = document.getElementById("resultsSummary");
    const resultsTableWrap = document.getElementById("resultsTableWrap");
    const resultsBody = document.getElementById("resultsBody");
    const csvLink = document.getElementById("csvLink");

    let pollTimer = null;
    let finalizeTimer = null;
    let isStreaming = false;

    function setStatus(text) {
      status.textContent = text;
    }

    function clearResults() {
      resultsMeta.textContent = "No results loaded";
      resultsSummary.innerHTML = '<div class="empty">No data yet. Start the stream, then stop it or load the latest results.</div>';
      resultsBody.innerHTML = "";
      resultsTableWrap.style.display = "none";
      csvLink.href = "#";
    }

    function stopPolling() {
      if (pollTimer) {
        clearInterval(pollTimer);
        pollTimer = null;
      }
    }

    function stopFinalizePolling() {
      if (finalizeTimer) {
        clearInterval(finalizeTimer);
        finalizeTimer = null;
      }
    }

    async function fetchSession() {
      const response = await fetch(`./outputs/session.json?t=${Date.now()}`);
      if (!response.ok) {
        throw new Error(await response.text());
      }
      return await response.json();
    }

    function startPolling() {
      stopPolling();
      pollTimer = setInterval(() => {
        loadResults(true);
      }, 1000);
    }

    function startFinalizePolling() {
      stopFinalizePolling();

      let attempts = 0;
      finalizeTimer = setInterval(async () => {
        attempts += 1;
        const data = await loadResults(true);

        if (!data) {
          if (attempts >= 10) {
            stopFinalizePolling();
            setStatus("Stopped. Unable to verify finalization.");
          }
          return;
        }

        const clips = Array.isArray(data.clips) ? data.clips : [];
        const processing = clips.some(row => row.clip_ready === false);

        if (!processing) {
          stopFinalizePolling();
          setStatus(`Stopped. Finalized ${data.total ?? clips.length ?? 0} results.`);
          return;
        }

        if (attempts >= 10) {
          stopFinalizePolling();
          setStatus("Stopped. Some clips may still be finalizing. Click Load Results again in a moment.");
        }
      }, 1000);
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    function renderResults(data) {
      const total = data.total ?? (Array.isArray(data.clips) ? data.clips.length : 0);
      const sessionName = data.session ?? "live_current";
      const videoUrl = data.video_url || `/outputs/${sessionName}/annotated.mp4`;
      const csvUrl = data.csv_url || `/outputs/${sessionName}/vehicles.csv`;
      const clips = Array.isArray(data.clips) ? data.clips : [];

      resultsMeta.textContent = `${total} vehicles captured`;
      csvLink.href = csvUrl;

      resultsSummary.innerHTML = `
        <div class="pill">Session: ${escapeHtml(sessionName)}</div>
        <div class="pill">Total: ${total}</div>
        <div class="pill">Video: <a class="link" href="${videoUrl}" target="_blank" rel="noreferrer">Open</a></div>
      `;

      if (!clips.length) {
        resultsTableWrap.style.display = "none";
        resultsSummary.insertAdjacentHTML("beforeend", '<div class="empty">No rows found yet.</div>');
        return;
      }

      resultsTableWrap.style.display = "block";
      resultsBody.innerHTML = clips.map((row) => {
        const clipUrl = row.clip_url || "";
        const thumbUrl = row.thumbnail_url || "";
        const plate = row.license_plate || "";
        const clipReady = row.clip_ready === true;
        const seenFrames = row.seen_frames ?? 0;

        return `
          <tr>
            <td>${escapeHtml(row.id ?? "")}</td>
            <td>${escapeHtml(row.vehicle_type ?? "")}</td>
            <td>${escapeHtml(row.direction ?? "")}</td>
            <td>${Number(row.confidence ?? 0).toFixed(2)}</td>
            <td>
              <div>${escapeHtml(plate || "-")}</div>
              <div style="margin-top:6px;color:#9fb1c7;font-size:12px;">frames: ${seenFrames}</div>
            </td>
            <td>
              ${
                thumbUrl
                  ? `<img class="thumb" src="${thumbUrl}" alt="thumbnail ${escapeHtml(row.id)}">`
                  : `<div class="empty" style="padding:10px;">No thumbnail</div>`
              }
              <div style="margin-top:8px;">
                ${
                  clipReady && clipUrl
                    ? `<a class="link" href="${clipUrl}" target="_blank" rel="noreferrer">Open clip</a>`
                    : ``
                }
              </div>
              <div style="margin-top:6px;color:${clipReady ? "#7fffba" : "#ffd27a"};font-size:12px;">
                ${clipReady ? "clip ready" : "recording..."}
              </div>
            </td>
          </tr>
        `;
      }).join("");
    }

    async function loadResults(silent = false) {
      try {
        const data = await fetchSession();
        renderResults(data);

        if (!silent) {
          setStatus(`Loaded ${data.total ?? 0} results.`);
        }
        return data;
      } catch (error) {
        if (!silent) {
          setStatus(`Unable to load results: ${error.message}`);
        }
        return null;
      }
    }

    async function startStream() {
      const source = sourceInput.value.trim();
      if (!source) {
        setStatus("Enter an RTSP URL or 0 first.");
        return;
      }

      stopFinalizePolling();

      try {
        const data = await fetchSession();
        const videoUrl = data.video_url || "";

        if (!videoUrl) {
          throw new Error("Missing video_url in outputs/session.json");
        }

        liveStream.src = videoUrl;
        liveStream.load();
        liveStream.play().catch(() => {});

        isStreaming = true;
        setStatus(`Streaming from: ${source}`);
        startPolling();
      } catch (error) {
        setStatus(`Unable to start stream: ${error.message}`);
      }
    }

    function stopStream() {
      liveStream.pause();
      liveStream.removeAttribute("src");
      liveStream.load();
      isStreaming = false;
      stopPolling();
      setStatus("Stopped. Waiting finalization...");

      setTimeout(() => {
        loadResults(true);
        startFinalizePolling();
      }, 1200);
    }

    startBtn.addEventListener("click", startStream);
    stopBtn.addEventListener("click", stopStream);
    refreshBtn.addEventListener("click", () => loadResults(false));
    sourceInput.addEventListener("keydown", (event) => {
      if (event.key === "Enter") {
        startStream();
      }
    });

    clearResults();
    loadResults(true);
  </script>
</body>
</html>
